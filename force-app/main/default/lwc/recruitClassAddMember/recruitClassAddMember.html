<template>
     <!-- modal start -->      
   <template if:true={isShowModal}>
    
        <lightning-quick-action-panel header="Add Recruit Class Members">

            <div class="slds-p-around_medium">
                <lightning-input
                    type="search"
                    label="Search Contact"
                    placeholder="Search by Name"
                    onchange={handleContactSearch}>
                </lightning-input>
            </div>
            <template if:true={showDataTable}>   
                <div class="modal-body">
                    <lightning-datatable
                        key-field="Id"
                        data={getContacts}
                        columns={columns}
                        onrowselection={handleRowSelection}
                        selected-rows={selectedContactIds}>
                    </lightning-datatable>
                </div> 
            </template>
            

            <div slot="footer">
                <lightning-button variant="neutral" onclick={handleClose} label="Cancel"></lightning-button>
                <lightning-button variant="brand" label="Add to Recruit Class" onclick={handleSubmit} class="slds-m-left_x-small"></lightning-button>
            </div>
        </lightning-quick-action-panel>
    </template>

</template>
